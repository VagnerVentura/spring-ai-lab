# ============================================================
# Docker Compose — Infraestrutura para o feat/04-rag
# ============================================================
# Sobe dois serviços:
#   1. pgvector  — PostgreSQL com extensão vetorial
#   2. ollama    — servidor de modelos locais
#
# Como usar:
#   docker compose up -d
#   docker compose down        (para e remove containers)
#   docker compose down -v     (remove também os volumes)
# ============================================================

version: '3.8'

services:

  # ──────────────────────────────────────────────────────────
  # pgvector: PostgreSQL + extensão pgvector
  # Imagem oficial com pgvector já instalado
  # ──────────────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # ollama: servidor de LLMs locais
  # ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama

volumes:
  pgvector_data:
  ollama_data:
