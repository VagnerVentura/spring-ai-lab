spring.application.name=ai-intro
server.port=8080

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:1.5b
spring.ai.ollama.chat.options.temperature=0.3

spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.embedding.enabled=true

spring.datasource.url=jdbc:postgresql://localhost:5432/ragdb
spring.datasource.username=raguser
spring.datasource.password=ragpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none

spring.ai.vectorstore.pgvector.dimensions=768

spring.ai.vectorstore.pgvector.index-type=hnsw

spring.ai.vectorstore.pgvector.distance-type=cosine_distance

spring.ai.vectorstore.pgvector.initialize-schema=true

rag.topk=5

rag.chunk-size=800

rag.chunk-overlap=100

logging.level.org.springframework.ai=DEBUG
logging.level.com.portfolio.aiintro=DEBUG
