# ============================================================
# Aplicação
# ============================================================
spring.application.name=ai-intro
server.port=8080

# ============================================================
# Ollama ? LLM para geração de texto
# ============================================================
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:1.5b
spring.ai.ollama.chat.options.temperature=0.3

# ============================================================
# Ollama ? Embedding Model
# ============================================================
# IMPORTANTE: modelo separado só para gerar embeddings!
# Embeddings precisam de um modelo específico (não o de chat).
# nomic-embed-text é pequeno (~274MB) e muito bom para PT-BR.
#
# Baixe com: docker exec -it ollama ollama pull nomic-embed-text
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.embedding.enabled=true

# ============================================================
# PostgreSQL + pgvector
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ragdb
spring.datasource.username=raguser
spring.datasource.password=ragpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ? não deixe o Hibernate recriar o schema em prod!
spring.jpa.hibernate.ddl-auto=none

# ============================================================
# pgvector ? configuração do VectorStore
# ============================================================
# Dimensão do vetor: deve bater com o modelo de embedding.
# nomic-embed-text gera vetores de 768 dimensões.
spring.ai.vectorstore.pgvector.dimensions=768

# Algoritmo de indexação (HNSW = mais rápido para busca)
spring.ai.vectorstore.pgvector.index-type=hnsw

# Função de similaridade (COSINE_DISTANCE = padrão para texto)
spring.ai.vectorstore.pgvector.distance-type=cosine_distance

# Cria a tabela/índice automaticamente se não existir
spring.ai.vectorstore.pgvector.initialize-schema=true

# ============================================================
# RAG ? configurações customizadas
# ============================================================
# Quantos chunks retornar na busca vetorial (top-K)
rag.topk=5

# Tamanho de cada chunk em caracteres ao fatiar documentos
rag.chunk-size=800

# Sobreposição entre chunks (evita perder contexto na borda)
rag.chunk-overlap=100

# ============================================================
# Logs
# ============================================================
logging.level.org.springframework.ai=DEBUG
logging.level.com.portfolio.aiintro=DEBUG
